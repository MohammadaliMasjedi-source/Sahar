<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sahar — Learn to live, live to learn</title>
  <meta name="description" content="A free, offline-first learning app for children denied school. Dari (RTL), English, and German.">
  <meta name="theme-color" content="#f4a259">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
  <!-- reuses the audio-first bootstrap's kid-language styles (pic-grid, listen-btn,
       progress path, etc.) so the main Tier-1 shelf and the first-contact flow
       share one visual system (SAHAR-COVERAGE §6.5 A). -->
  <link rel="stylesheet" href="./bootstrap.css">
  <!-- SAHAR-V3 CORE slice #1: local-first child profiles + the child-visible
       garden (profiles.js/profiles.css) — layers on the same token system. -->
  <link rel="stylesheet" href="./profiles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='1' x2='0' y2='0'%3E%3Cstop offset='0' stop-color='%230b1026'/%3E%3Cstop offset='1' stop-color='%23f4a259'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='12' fill='url(%23g)'/%3E%3Ccircle cx='24' cy='32' r='11' fill='%23ffd89b'/%3E%3C/svg%3E">
  <!-- real PNG icon set (generated from the dawn-bird mascot, see icons/README
       via git history / INSTALL.md) -- iOS ignores the manifest for A2HS and
       needs its own apple-touch-icon + capability meta tags. -->
  <link rel="icon" sizes="192x192" href="./icons/icon-192-any.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sahar">
</head>
<body>

<!-- SAHAR-V3 CORE slice #1, feature 1: the "who's learning" gate. A
     pre-literate child picks THEIR profile by avatar + color alone, no
     reading required. A caregiver can add a sibling from the same screen
     (explicitly labelled as a grown-up step). Shown instead of #app until a
     profile is active; toggled by app.js's openApp()/openProfileGate(). -->
<div class="wrap" id="profileGate" hidden></div>

<div class="wrap" id="app">

  <!-- top bar: brand + language switcher -->
  <header class="topbar">
    <div class="brand">
      <!-- Sahar mark (small): a sun cresting over night -->
      <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
        <defs>
          <linearGradient id="lg" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0" stop-color="var(--night, #0b1026)"/>
            <stop offset="1" stop-color="var(--amber, #f4a259)"/>
          </linearGradient>
        </defs>
        <rect width="48" height="48" rx="12" fill="url(#lg)"/>
        <circle cx="24" cy="32" r="11" fill="var(--gold, #ffd89b)"/>
      </svg>
      <div>
        <h1>Sahar</h1>
        <p class="motto" data-i18n="motto">Learn to live, live to learn.</p>
      </div>
    </div>
    <nav class="langs" id="langs" aria-label="Language">
      <button data-lang="fa" type="button">دری</button>
      <button data-lang="en" type="button">EN</button>
      <button data-lang="de" type="button">DE</button>
    </nav>
    <!-- switch-profile chip: shows the active child's own avatar; tapping it
         reopens the "who's learning" picker (icon-only, no reading needed
         to find "my page again" or to hand the phone to a sibling). -->
    <button type="button" class="profile-chip" id="profileChip" aria-label="Switch profile"></button>
  </header>

  <!-- Sahar the heroine + her greeting -->
  <section class="hero">
    <!-- the dawn-bird mascot: perches by Sahar's greeting on the welcome screen
         (SAHAR-COVERAGE §6.5-C) — the same character also praises the child
         on a correct answer (see .praise-bubble, wired in app.js). -->
    <div class="hero-bird" aria-hidden="true">
      <svg class="dawnbird" width="40" height="40" viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="20" r="19" fill="var(--amber, #f4a259)" opacity=".22"/>
        <ellipse cx="21" cy="23" rx="9" ry="7.5" fill="var(--amber, #f4a259)"/>
        <circle cx="14" cy="18" r="6" fill="var(--amber, #f4a259)"/>
        <circle cx="12" cy="17" r="1.3" fill="var(--ink, #1c1430)"/>
        <path d="M9.5 19.6 L3.5 18 L9.5 16.4 Z" fill="var(--gold, #ffd89b)"/>
        <path d="M23 22 q7 -4 11 -1 q-5 5 -11 3Z" fill="var(--rose, #e0719b)"/>
      </svg>
    </div>
    <!-- Sahar: a hopeful girl facing the dawn. Secular — no religious symbols.
         2026-07-12 redraw (Mo escalation): the old markup painted the hair
         dome BEFORE the face circle, so the face overdrew it and only a
         detached dark sliver floated above the head; and the dress used
         var(--rose) with NO fallback, so it rendered BLACK anywhere the
         token was out of scope. Now: face first, then a short bobbed crop
         with bangs drawn AROUND it — stops at the ears, ears/forehead/jaw/
         neck all visible, no drape past the jaw, no head-covering
         silhouette (ARCHITECTURE.md §10: never a headscarf/veil) — and
         every var() fill carries its literal hex fallback. -->
    <svg class="sahar" viewBox="0 0 96 110" role="img" aria-label="Sahar, a girl at dawn">
      <defs>
        <linearGradient id="sky" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0" stop-color="var(--amber, #f4a259)"/>
          <stop offset=".5" stop-color="var(--rose, #e0719b)"/>
          <stop offset="1" stop-color="var(--dusk, #3b2f63)"/>
        </linearGradient>
      </defs>
      <!-- dawn behind her: soft sky glow + the rising sun peeking out from
           behind her shoulders (amber, NOT gold — gold sat right behind the
           neck and merged with the skin tone into one blob) -->
      <circle cx="48" cy="60" r="46" fill="url(#sky)" opacity=".55"/>
      <circle cx="48" cy="84" r="18" fill="var(--amber, #f4a259)" opacity=".9"/>
      <!-- neck first, so the chin and the dress both overlap it -->
      <rect x="44.5" y="61" width="7" height="13" rx="3" fill="#f6c9a4"/>
      <!-- dress: warm rose, sloped shoulders, round gold collar — explicit
           fallback, can never resolve to black -->
      <path d="M34 80 Q36.5 71 45 70 L51 70 Q59.5 71 62 80 L66 104 L30 104 Z" fill="var(--rose, #e0719b)"/>
      <ellipse cx="48" cy="70.8" rx="5.2" ry="2.2" fill="var(--gold, #ffd89b)"/>
      <!-- ears: hair locks overlap their tops, so it reads as hair ON a head -->
      <circle cx="31.5" cy="51" r="2.8" fill="#f6c9a4"/>
      <circle cx="64.5" cy="51" r="2.8" fill="#f6c9a4"/>
      <!-- face -->
      <circle cx="48" cy="50" r="16" fill="#f6c9a4"/>
      <!-- hair: short tousled bob + scalloped bangs, drawn AFTER the face so
           it frames it; ends at the ears — secular, reads as hair, never as
           a headscarf/veil silhouette -->
      <path d="M30.5 53 C29 38 36 29 48 29 C60 29 67 38 65.5 53
               Q64.5 47.5 61 43.5 Q56.5 48.5 52.5 43 Q48 49 43.5 43
               Q39.5 48.5 35 43.5 Q32 47.5 30.5 53 Z" fill="#2a1f3d"/>
      <path d="M43.5 30 Q45 23.5 50 24.5 Q47.5 27 52 29 Q47.5 31 43.5 30 Z" fill="#2a1f3d"/>
      <path d="M37.5 34.5 Q46 30 56 33.5" stroke="#453564" stroke-width="2" fill="none" stroke-linecap="round" opacity=".9"/>
      <!-- eyes + blush + smile (hopeful) -->
      <circle cx="42" cy="49" r="1.9" fill="#1c1430"/>
      <circle cx="54" cy="49" r="1.9" fill="#1c1430"/>
      <circle cx="42.7" cy="48.3" r=".65" fill="#fff6ea" opacity=".9"/>
      <circle cx="54.7" cy="48.3" r=".65" fill="#fff6ea" opacity=".9"/>
      <circle cx="39" cy="54" r="2.7" fill="var(--rose, #e0719b)" opacity=".4"/>
      <circle cx="57" cy="54" r="2.7" fill="var(--rose, #e0719b)" opacity=".4"/>
      <path d="M43 55.5 q5 4.5 10 0" stroke="#1c1430" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="say">
      <h2 id="greet">سلام! من سحرم.</h2>
      <p id="greetSub">بیا با هم یاد بگیریم.</p>
    </div>
  </section>

  <!-- the child-visible GARDEN (SAHAR-V3 CORE slice #1, feature 2): one
       plant per lesson pack, blooming as THIS profile completes lessons.
       Per-profile, persists across reloads, switches with the active
       profile. Rendered by app.js's renderGarden(). -->
  <section class="garden-view" id="gardenView"></section>

  <!-- band indicator/selector (SAHAR-V3 CORE slice #2: age-band packaging):
       a gentle icon/color strip showing which of the four charter age
       bands the active profile is on, and letting a caregiver switch it —
       which immediately swaps the shelf below. Rendered by app.js's
       renderBandBar(); hidden mid-lesson and when no profile is active. -->
  <section class="band-bar" id="bandBar" hidden></section>

  <!-- audio-first doorway: for a pre-literate child, start WITHOUT reading -->
  <a class="bootstrap-door" href="./bootstrap.html">
    <span class="door-ico"></span>
    <span class="door-txt">
      <b>شروع بدون خواندن</b>
      <small>Start with sound &amp; pictures — no reading needed</small>
    </span>
  </a>

  <!-- the dawn progress path: a visible Duolingo-style bar + the mascot bird
       flying toward the sunrise, shown while a lesson is open (app.js) -->
  <div class="dawn-progress" id="progressPath"></div>

  <!-- the lesson stage (rendered by app.js) -->
  <main id="stage" aria-live="polite"></main>

  <!-- footer: the Leitner rule, made visible -->
  <footer class="foot">
    <span id="ruleText">Got it &rarr; the card waits longer.  Again &rarr; you'll see it tomorrow.</span><br>
    <span class="ladder">1 &rarr; 2 &rarr; 4 &rarr; 9 &rarr; 21</span>
    <span data-i18n="days"> days</span>
    <br><span class="status" id="offline">offline-ready</span>
    <br><a class="link-btn" href="./teacher.html" style="display:inline-block; margin-block-start:10px; text-decoration:none;">📄 برای آموزگاران / For teachers / Für Lehrkräfte</a>
  </footer>
</div>

<!-- audio-first providers, shared with bootstrap.html: pictures (offline SVGs),
     audio (honest recording->TTS->tone fallback chain), the shuffle helper -->
<script src="./pictures.js"></script>
<script src="./mascot.js"></script>
<script src="./audio.js"></script>
<script src="./bootstrap-core.js"></script>
<script src="./profiles.js"></script>
<script src="./app.js"></script>
</body>
</html>
