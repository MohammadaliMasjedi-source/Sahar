<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sahar — Learn to live, live to learn</title>
  <meta name="description" content="A free, offline-first learning app for children denied school. Dari (RTL), English, and German.">
  <meta name="theme-color" content="#f4a259">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='1' x2='0' y2='0'%3E%3Cstop offset='0' stop-color='%230b1026'/%3E%3Cstop offset='1' stop-color='%23f4a259'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='12' fill='url(%23g)'/%3E%3Ccircle cx='24' cy='32' r='11' fill='%23ffd89b'/%3E%3C/svg%3E">
</head>
<body>
<div class="wrap" id="app">

  <!-- top bar: brand + language switcher -->
  <header class="topbar">
    <div class="brand">
      <!-- Sahar mark (small): a sun cresting over night -->
      <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
        <defs>
          <linearGradient id="lg" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0" stop-color="var(--night)"/>
            <stop offset="1" stop-color="var(--amber)"/>
          </linearGradient>
        </defs>
        <rect width="48" height="48" rx="12" fill="url(#lg)"/>
        <circle cx="24" cy="32" r="11" fill="var(--gold)"/>
      </svg>
      <div>
        <h1>Sahar</h1>
        <p class="motto" data-i18n="motto">Learn to live, live to learn.</p>
      </div>
    </div>
    <nav class="langs" id="langs" aria-label="Language">
      <button data-lang="fa" type="button">دری</button>
      <button data-lang="en" type="button">EN</button>
      <button data-lang="de" type="button">DE</button>
    </nav>
  </header>

  <!-- Sahar the heroine + her greeting -->
  <section class="hero">
    <!-- Sahar: a hopeful girl facing the dawn. Secular — no religious symbols. -->
    <svg class="sahar" viewBox="0 0 96 110" role="img" aria-label="Sahar, a girl at dawn">
      <defs>
        <linearGradient id="sky" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0" stop-color="var(--amber)"/>
          <stop offset=".5" stop-color="var(--rose)"/>
          <stop offset="1" stop-color="var(--dusk)"/>
        </linearGradient>
      </defs>
      <!-- dawn behind her -->
      <circle cx="48" cy="60" r="46" fill="url(#sky)" opacity=".55"/>
      <circle cx="48" cy="78" r="20" fill="var(--gold)" opacity=".9"/>
      <!-- hair -->
      <path d="M30 44 q18 -26 36 0 q4 18 -2 30 q-16 8 -32 0 q-6 -12 -2 -30Z" fill="#2a1f3d"/>
      <!-- face -->
      <circle cx="48" cy="50" r="16" fill="#f6c9a4"/>
      <!-- eyes + smile (hopeful) -->
      <circle cx="42" cy="49" r="1.8" fill="#1c1430"/>
      <circle cx="54" cy="49" r="1.8" fill="#1c1430"/>
      <path d="M42 56 q6 5 12 0" stroke="#1c1430" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- shoulders -->
      <path d="M30 86 q18 -14 36 0 v18 h-36Z" fill="var(--rose)"/>
    </svg>
    <div class="say">
      <h2 id="greet">سلام! من سحرم.</h2>
      <p id="greetSub">بیا با هم یاد بگیریم.</p>
    </div>
  </section>

  <!-- audio-first doorway: for a pre-literate child, start WITHOUT reading -->
  <a class="bootstrap-door" href="./bootstrap.html">
    <span class="door-ico">🔊🐦</span>
    <span class="door-txt">
      <b>شروع بدون خواندن</b>
      <small>Start with sound &amp; pictures — no reading needed</small>
    </span>
  </a>

  <!-- the lesson stage (rendered by app.js) -->
  <main id="stage" aria-live="polite"></main>

  <!-- footer: the Leitner rule, made visible -->
  <footer class="foot">
    <span id="ruleText">Got it &rarr; the card waits longer.  Again &rarr; you'll see it tomorrow.</span><br>
    <span class="ladder">1 &rarr; 2 &rarr; 4 &rarr; 9 &rarr; 21</span>
    <span data-i18n="days"> days</span>
    <br><span class="status" id="offline">offline-ready</span>
  </footer>
</div>

<script src="./app.js"></script>
</body>
</html>
